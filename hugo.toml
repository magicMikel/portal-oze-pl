baseURL = "https://portal-oze.pl/"
languageCode = "pl-PL"
title = "Portal OZE"
defaultContentLanguage = "pl"
enableRobotsTXT = true
summaryLength = 160
[pagination]
  pagerSize = 12
copyright = "© 2026 portal-oze.pl"
[params]
  siteName = "Portal OZE"
  siteDescription = "Największy portal informacyjny o odnawialnych źródłach energii"
  siteKeywords = "OZE Polska, energia słoneczna, wiatr, wodór, magazynowanie energii"
  author = "Redakcja Portal OZE"
  dateFormat = "2 January 2006"
[taxonomies]
  category = "kategorie"
  tag = "tagi"
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"
